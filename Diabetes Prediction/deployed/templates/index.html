<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diabetes Predictor</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      /* Keeps your dynamic background image capability while adding a beautiful fallback overlay */
      background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(30, 27, 75, 0.85)), url("../static/wall.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: -0.5px;
      margin-bottom: 30px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      animation: fadeInDown 1s ease-out;
    }

    .container {
      width: 100%;
      max-width: 550px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 1s ease-out;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    input { 
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      outline: none;
      padding: 14px 20px;
      font-size: 0.95rem;
      color: #fff;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input:hover {
      background: rgba(15, 23, 42, 0.8);
      border-color: rgba(255, 255, 255, 0.3);
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
      background: rgba(15, 23, 42, 0.9);
    }

    .btn-block { 
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn-block:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
      background: linear-gradient(135deg, #574df2 0%, #8644f5 100%);
    }

    .btn-block:active {
      transform: translateY(1px);
    }

    .result-text {
      margin-top: 25px;
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #e0e7ff;
      animation: fadeIn 0.5s ease-in;
    }

    footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
    }

    /* Elegant Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <header>
    <h1>Diabetes Predictor</h1>
  </header>

  <main class="container">
    <form action="{{ url_for('predict') }}" method="post">
      <div class="input-group">
        <input type="text" name="pregnancies" placeholder="Number of Pregnancies e.g., 0" required>
      </div>
      <div class="input-group">
        <input type="text" name="glucose" placeholder="Glucose (mg/dL) e.g., 80" required>
      </div>
      <div class="input-group">
        <input type="text" name="bloodpressure" placeholder="Blood Pressure (mmHg) e.g., 80" required>
      </div>
      <div class="input-group">
        <input type="text" name="skinthickness" placeholder="Skin Thickness (mm) e.g., 20" required>
      </div>
      <div class="input-group">
        <input type="text" name="insulin" placeholder="Insulin Level (IU/mL) e.g., 80" required>
      </div>
      <div class="input-group">
        <input type="text" name="bmi" placeholder="Body Mass Index (kg/m²) e.g., 23.1" required>
      </div>
      <div class="input-group">
        <input type="text" name="dpf" placeholder="Diabetes Pedigree Function e.g., 0.52" required>
      </div>
      <div class="input-group">
        <input type="text" name="age" placeholder="Age (years) e.g., 34" required>
      </div>
      
      <button type="submit" class="btn-block">Predict Score</button>
    </form>

    {% if prediction_text %}
      <div class="result-text">
        {{ prediction_text }}
      </div>
    {% endif %}
  </main>

  <footer>&copy;  Diabetes Predictor. All Rights Reserved.</footer>

</body>
</html>
